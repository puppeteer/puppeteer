name: Static Analysis (Stage 4b)
on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch or SHA to analyze'
        required: true

permissions:
  contents: write
  pull-requests: write
  security-events: write

jobs:
  eslint:
    name: eslint
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
        env:
          GIT_LFS_SKIP_SMUDGE: '1'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: |
          if [ -f yarn.lock ]; then corepack enable && yarn install --immutable || yarn install
          elif [ -f pnpm-lock.yaml ]; then corepack enable && pnpm install --frozen-lockfile || pnpm install
          elif [ -f package-lock.json ]; then npm ci
          else npm install
          fi
      - name: Auto-fix
        run: npx eslint . --fix || true
      - name: Commit fixes
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add -A
          git diff --cached --quiet || git commit -m 'style: auto-fix eslint findings'
          git push || true
      - run: npx eslint . || true
